; NavaMesh Reticulum Gatekeeper
; RAK4631 (nRF52840 + SX1262) — microReticulum-based power controller
; Listens for Reticulum packets over LoRa, gates Heltec HaLow via IO1/EN pin.

; ── Shared settings (apply to all board environments) ────────────────────────
[env]
monitor_speed  = 115200
upload_speed   = 460800
build_type     = debug

build_flags =
    -Wall
    -Wno-missing-field-initializers
    -Wno-format

    ; Tell microReticulum to use the filesystem for persisting
    ; the node's Identity keypair and learned route paths.
    ; Without this, the node generates a new Identity every boot
    ; (new address every time — Sideband loses track of it).
    -DRNS_USE_FS
    -DRNS_PERSIST_PATHS

    ; Tell the microStore filesystem adapter which backend to use.
    ; UniversalFileSystem auto-detects LittleFS on nRF52.
    -DUSTORE_USE_UNIVERSALFS

    ; MsgPack: disable Boost dependency (not available on MCUs)
    -DMSGPACK_USE_BOOST=OFF

; ── Library dependencies ─────────────────────────────────────────────────────
; These are fetched automatically by PlatformIO on first build.
; The LoRaInterface is NOT listed here — it lives in lib/ and PlatformIO
; finds it automatically because of the lib_dir convention.
lib_deps =
    ArduinoJson @ ^7.4.2
    MsgPack     @ ^0.4.2

    ; RadioLib: the unified radio driver used by LoRaInterface.
    ; This replaces the custom sx126x.cpp from RNode firmware.
    jgromes/RadioLib @ ^7.0.0

    ; Attermann's fork of arduinolibs — provides the crypto primitives
    ; (AES, SHA, Ed25519, X25519) that Reticulum uses for encryption.
    https://github.com/attermann/Crypto.git

    ; microStore: filesystem abstraction layer.
    ; Used to save/load the Identity keypair and route table to flash.
    https://github.com/attermann/microStore.git

    ; The microReticulum stack itself.
    https://github.com/attermann/microReticulum.git

; ── RAK4631 environment ───────────────────────────────────────────────────────
[env:wiscore_rak4631]
framework = arduino
platform  = nordicnrf52

; We use a custom board definition because the standard PlatformIO nRF52
; package doesn't include the RAK4630. The boards/ folder in this project
; holds rak4630.json, and variants/ holds the pin/peripheral definitions.
board                    = rak4630
board_build.variants_dir = variants
board_build.variant      = rak4630
board_build.FileSystem   = littlefs

; nRF52 Arduino framework defaults to -fno-exceptions and -fno-rtti,
; which disables C++ exception handling and runtime type info.
; microReticulum uses both — we must explicitly re-enable them.
; The nosys.specs stub satisfies linker references to syscalls
; (like _write) that the nRF52 Arduino framework doesn't provide.
build_unflags =
    -fno-exceptions
    -fno-rtti
    --specs=nano.specs

build_flags =
    ${env.build_flags}
    -fexceptions
    -frtti
    --specs=nosys.specs

    ; Identifies this as nRF52 to platform-specific code in microReticulum
    -DMCU_NRF52

    ; Selects the RAK4631 pin definitions inside LoRaInterface.cpp
    ; (the #elif defined(BOARD_RAK4631) block we read earlier)
    -DBOARD_RAK4631

    ; nRF52 memory allocator setting.
    ; The nRF52840 has 256KB RAM — the standard heap allocator works fine
    ; here. (The HEAP_POOL_ALLOCATOR option exists for tighter control but
    ; RNS_HEAP_ALLOCATOR is the safe starting point.)
    -DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_ALLOCATOR
